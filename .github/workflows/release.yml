name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Zip entry timestamps use local calendar fields; pin UTC so a rebuild
      # on any machine reproduces the CI asset byte-for-byte.
      TZ: UTC
    defaults:
      run:
        working-directory: plugins/tokengraph
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: plugins/tokengraph/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Smoke test
        run: pnpm smoke -- --root . --json

      - name: Validate plugin
        run: pnpm validate:plugin

      - name: Build release package
        run: pnpm --silent package:plugin -- --release --json > release-package.json

      - name: Build standalone release archive
        run: pnpm --silent package:plugin -- --json > bundle-package.json

      - name: Verify generated release and create checksum
        id: artifact
        shell: bash
        run: |
          set -euo pipefail
          archive=$(node -e 'const fs=require("fs"); const value=JSON.parse(fs.readFileSync("bundle-package.json", "utf8")); if (!value.archivePath) throw new Error("bundle package did not report archivePath"); process.stdout.write(value.archivePath);')
          checksum="${archive}.sha256"
          # Write the checksum against the bare filename so users can run
          # "sha256sum -c" next to the downloaded asset and no runner paths
          # leak into published files.
          (cd "$(dirname "$archive")" && sha256sum "$(basename "$archive")" > "$(basename "$checksum")")
          cat "$checksum"
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      # The release is created as a DRAFT on purpose: a maintainer reviews the
      # asset and gate evidence, then clicks Publish. Do not forget that final
      # step - until it happens, users installing from the latest release get
      # the previous version.
      - name: Create draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        working-directory: .
        run: |
          set -euo pipefail
          cat > release-notes.md <<'EOF'
          Automated release built from the tagged commit. The attached ZIP and SHA-256 checksum were produced by CI.

          Routing enforcement remains disabled pending eligible reviewed schema-v3 real-host evidence. This release ships remediation and evidence tooling; it does not promote enforced routing or B7 polyglot indexing.
          EOF
          gh release create "$TAG_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --draft \
            --title "TokenGraph $TAG_NAME" \
            --notes-file release-notes.md \
            "${{ steps.artifact.outputs.archive }}" \
            "${{ steps.artifact.outputs.checksum }}"
